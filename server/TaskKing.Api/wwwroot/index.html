<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task King</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 5px 0; }
        form { margin-top: 20px; display: flex; gap: 5px; flex-wrap: wrap; }
        input, select { padding: 5px; }
        button { padding: 5px 10px; }
    </style>
</head>
<body>

<h1>Task King</h1>

<div style="margin-bottom: 10px;">
    <select id="filterStatus">
        <option value="">All</option>
        <option value="Todo">Todo</option>
        <option value="InProgress">InProgress</option>
        <option value="Done">Done</option>
    </select>

    <select id="sortTasks">
        <option value="">Default</option>
        <option value="created">Created</option>
        <option value="priority">Priority</option>
    </select>
</div>

<ul id="tasks"></ul>

<form id="taskForm">
    <input type="text" id="taskTitle" placeholder="Task title" required />

    <select id="taskStatus">
        <option value="Todo">Todo</option>
        <option value="InProgress">InProgress</option>
        <option value="Done">Done</option>
    </select>

    <select id="taskPriority">
        <option value="Low">Low</option>
        <option value="Medium" selected>Medium</option>
        <option value="High">High</option>
    </select>

    <button type="submit">Add Task</button>
</form>

<script>
    async function loadTasks() {
        try {
            const filter = document.getElementById('filterStatus').value;
            const sort = document.getElementById('sortTasks').value;

            let url = '';

            if (filter) {
                url = `/api/tasks/status/${filter}`;
            } else if (sort) {
                url = `/api/tasks?sort=${sort}`;
            } else {
                url = `/api/tasks`;
            }

            const response = await fetch(url);
            const tasks = await response.json();

            const list = document.getElementById('tasks');
            list.innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');

                li.textContent = `${task.id}: ${task.title} [${task.priority}] (${task.status}) `;

                const delBtn = document.createElement('button');
                delBtn.textContent = "Delete";
                delBtn.style.marginLeft = "10px";

                delBtn.onclick = async () => {
                    await fetch(`/api/tasks/${task.id}`, { method: 'DELETE' });
                    loadTasks();
                };

                const editBtn = document.createElement('button');
                editBtn.textContent = "Edit";
                editBtn.style.marginLeft = "5px";

                editBtn.onclick = async () => {
                    const newTitle = prompt("New title:", task.title);
                    if (!newTitle) return;

                    const newPriority = prompt("Priority (Low/Medium/High):", task.priority) || task.priority;
                    const newStatus = prompt("Status (Todo/InProgress/Done):", task.status) || task.status;

                    await fetch(`/api/tasks/${task.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: newTitle,
                            description: task.description,
                            status: newStatus,
                            priority: newPriority
                        })
                    });

                    loadTasks();
                };

                li.appendChild(delBtn);
                li.appendChild(editBtn);
                list.appendChild(li);
            });
        } catch (err) {
            console.error('Error loading tasks:', err);
        }
    }

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('taskTitle').value.trim();
        const status = document.getElementById('taskStatus').value;
        const priority = document.getElementById('taskPriority').value;

        if (!title) return;

        try {
            await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    title,
                    status,
                    priority
                })
            });

            document.getElementById('taskTitle').value = '';
            loadTasks();
        } catch (err) {
            console.error('Error creating task:', err);
        }
    });

    document.getElementById('filterStatus')
        .addEventListener('change', loadTasks);

    document.getElementById('sortTasks')
        .addEventListener('change', loadTasks);

    loadTasks();
</script>

</body>
</html>
