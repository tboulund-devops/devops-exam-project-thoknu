<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task King</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 5px 0; }
        form { margin-top: 20px; display: flex; gap: 5px; flex-wrap: wrap; }
        input, select { padding: 5px; }
        button { padding: 5px 10px; }
        .overdue { color: red; font-weight: bold; }
        .comments { margin-left: 20px; font-size: 0.9em; color: #444; }
        .comment-box { margin-left: 20px; margin-top: 5px; display: flex; gap: 5px; }
        .pagination { margin-top: 10px; display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<h1>Task King</h1>

<div style="margin-bottom: 20px;">
    <h3>Categories</h3>
    <ul id="categories"></ul>

    <form id="categoryForm">
        <input type="text" id="categoryName" placeholder="Category name" required />
        <button type="submit">Add Category</button>
    </form>
</div>

<div style="margin-bottom: 10px;">
    <input type="text" id="searchBox" placeholder="Search tasks..." />

    <select id="filterStatus">
        <option value="">All</option>
        <option value="Todo">Todo</option>
        <option value="InProgress">InProgress</option>
        <option value="Done">Done</option>
    </select>

    <select id="sortTasks">
        <option value="">Default</option>
        <option value="created">Created</option>
        <option value="priority">Priority</option>
    </select>

    <select id="filterOverdue">
        <option value="">All Tasks</option>
        <option value="overdue">Overdue Only</option>
    </select>
</div>

<ul id="tasks"></ul>

<div class="pagination">
    <button id="prevPage">Prev</button>
    <span id="pageInfo"></span>
    <button id="nextPage">Next</button>
</div>

<form id="taskForm">
    <input type="text" id="taskTitle" placeholder="Task title" required />

    <select id="taskStatus">
        <option value="Todo">Todo</option>
        <option value="InProgress">InProgress</option>
        <option value="Done">Done</option>
    </select>

    <select id="taskPriority">
        <option value="Low">Low</option>
        <option value="Medium" selected>Medium</option>
        <option value="High">High</option>
    </select>

    <select id="taskCategory">
        <option value="">No category</option>
    </select>

    <input type="datetime-local" id="taskDueDate" />

    <button type="submit">Add Task</button>
</form>

<script>
    let categories = [];

    let currentPage = 1;
    const pageSize = 10;
    let totalLoaded = 0;

    async function loadCategories() {
        const res = await fetch('/api/categories');

        if (!res.ok) {
            categories = [];
            return;
        }

        const text = await res.text();
        categories = text ? JSON.parse(text) : [];

        const select = document.getElementById('taskCategory');
        select.innerHTML =
            '<option value="">No category</option>' +
            categories.map(c =>
                `<option value="${c.id}">${c.name}</option>`
            ).join('');

        const list = document.getElementById('categories');
        list.innerHTML = '';

        categories.forEach(cat => {
            const li = document.createElement('li');

            li.textContent = `${cat.id}: ${cat.name} `;

            const editBtn = document.createElement('button');
            editBtn.textContent = "Edit";
            editBtn.style.marginLeft = "5px";

            editBtn.onclick = async () => {
                const newName = prompt("New category name:", cat.name);
                if (!newName) return;

                await fetch(`/api/categories/${cat.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                });

                loadCategories();
                loadTasks();
            };

            const delBtn = document.createElement('button');
            delBtn.textContent = "Delete";
            delBtn.style.marginLeft = "5px";

            delBtn.onclick = async () => {
                await fetch(`/api/categories/${cat.id}`, {
                    method: 'DELETE'
                });

                loadCategories();
                loadTasks();
            };

            li.appendChild(editBtn);
            li.appendChild(delBtn);
            list.appendChild(li);
        });
    }

    async function loadTasks() {
        try {
            const filter = document.getElementById('filterStatus').value;
            const sort = document.getElementById('sortTasks').value;
            const overdue = document.getElementById('filterOverdue').value;
            const search = document.getElementById('searchBox').value.trim();

            let url = '';

            if (search) {
                url = `/api/tasks/search?q=${encodeURIComponent(search)}`;
            } else if (filter) {
                url = `/api/tasks/status/${filter}`;
            } else if (sort) {
                url = `/api/tasks?sort=${sort}`;
            } else {
                url = `/api/tasks`;
            }

            const response = await fetch(url);
            const tasks = await response.json();

            const now = new Date();
            let filtered = tasks;

            if (overdue === "overdue") {
                filtered = tasks.filter(t =>
                    t.dueDate && new Date(t.dueDate) < now && t.status !== "Done"
                );
            }

            const start = (currentPage - 1) * pageSize;
            const paged = filtered.slice(start, start + pageSize);

            totalLoaded = filtered.length;

            document.getElementById('pageInfo').textContent =
                `Page ${currentPage} (${totalLoaded} tasks)`;

            const list = document.getElementById('tasks');
            list.innerHTML = '';

            paged.forEach(task => {
                const li = document.createElement('li');
                li.setAttribute('data-task-id', task.id);
                li.setAttribute('data-test', 'task-item');
                li.setAttribute('data-title', task.title);

                const categoryName = task.categoryName ?? "No category";

                const isOverdue =
                    task.dueDate &&
                    new Date(task.dueDate) < now &&
                    task.status !== "Done";

                li.className = isOverdue ? "overdue" : "";

                const text = document.createElement('span');
                text.textContent =
                    `${task.id}: ${task.title} [${task.priority}] (${task.status}) - ${categoryName}` +
                    (task.dueDate ? ` | Due: ${new Date(task.dueDate).toLocaleString()}` : '');

                li.appendChild(text);

                const delBtn = document.createElement('button');
                delBtn.textContent = "Delete";
                delBtn.style.marginLeft = "10px";

                delBtn.onclick = async () => {
                    await fetch(`/api/tasks/${task.id}`, { method: 'DELETE' });
                    loadTasks();
                };

                const editBtn = document.createElement('button');
                editBtn.textContent = "Edit";
                editBtn.style.marginLeft = "5px";

                editBtn.onclick = async () => {
                    const newTitle = prompt("New title:", task.title);
                    if (!newTitle) return;

                    const newPriority = prompt("Priority (Low/Medium/High):", task.priority) || task.priority;
                    const newStatus = prompt("Status (Todo/InProgress/Done):", task.status) || task.status;

                    const newCategoryId = prompt("Category ID:", task.categoryId ?? "") || task.categoryId;

                    await fetch(`/api/tasks/${task.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: newTitle,
                            description: task.description,
                            status: newStatus,
                            priority: newPriority,
                            categoryId: newCategoryId ? parseInt(newCategoryId) : null,
                            dueDate: task.dueDate ?? null
                        })
                    });

                    loadTasks();
                };

                li.appendChild(delBtn);
                li.appendChild(editBtn);

                const commentContainer = document.createElement('div');
                loadComments(task.id, commentContainer);
                li.appendChild(commentContainer);

                list.appendChild(li);
            });
        } catch (err) {
            console.error('Error loading tasks:', err);
        }
    }

    document.getElementById('prevPage').onclick = () => {
        if (currentPage > 1) {
            currentPage--;
            loadTasks();
        }
    };

    document.getElementById('nextPage').onclick = () => {
        const maxPage = Math.ceil(totalLoaded / pageSize);
        if (currentPage < maxPage) {
            currentPage++;
            loadTasks();
        }
    };

    document.getElementById('searchBox').addEventListener('input', () => {
        currentPage = 1;
        loadTasks();
    });

    document.getElementById('filterStatus').addEventListener('change', () => {
        currentPage = 1;
        loadTasks();
    });

    document.getElementById('sortTasks').addEventListener('change', () => {
        currentPage = 1;
        loadTasks();
    });

    document.getElementById('filterOverdue').addEventListener('change', () => {
        currentPage = 1;
        loadTasks();
    });

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const title = document.getElementById('taskTitle').value.trim();
        const status = document.getElementById('taskStatus').value;
        const priority = document.getElementById('taskPriority').value;
        const categoryId = document.getElementById('taskCategory').value;
        const dueDate = document.getElementById('taskDueDate').value;

        if (!title) return;

        await fetch('/api/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title,
                status,
                priority,
                categoryId: categoryId ? parseInt(categoryId) : null,
                dueDate: dueDate ? new Date(dueDate).toISOString() : null
            })
        });

        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDueDate').value = '';
        document.getElementById('searchBox').value = '';
        currentPage = 1;

        await loadTasks();
        await new Promise(r => setTimeout(r, 150));
    });

    loadCategories();
    loadTasks();
</script>

</body>
</html>
